<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enter the Vault</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="login-body">
    <div class="login-container">
        <h1 class="anime-title">Restricted Access</h1>
        
        <div class="input-group">
            <input type="text" id="username" placeholder="Shinobi ID">
        </div>
        <div class="input-group">
            <input type="password" id="password" placeholder="Passcode">
        </div>
        
        <button onclick="checkCredentials()" class="anime-btn">Unlock</button>
        <p id="error-msg" class="error-text"></p>
    </div>

    <script src="js/auth.js"></script>
</body>
</html>
